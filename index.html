<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoSIM - Comparateur Achat/Location</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-wrap { white-space: nowrap; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased p-2 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col lg:flex-row">
        
        <div class="w-full lg:w-80 bg-slate-900 text-white p-6 overflow-y-auto">
            <h2 class="text-xl font-bold mb-6 text-blue-400">Paramètres</h2>
            
            <div class="space-y-4">
                <h3 class="text-sm font-bold uppercase tracking-wider text-slate-500 border-b border-slate-700 pb-1">Achat</h3>
                <div class="grid grid-cols-1 gap-3 text-xs">
                    <div>
                        <label class="text-slate-400">Prix du bien (€)</label>
                        <input type="number" id="prixBien" value="145000" class="w-full bg-slate-800 rounded p-2 mt-1 focus:outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="text-slate-400">Apport (€)</label>
                        <input type="number" id="apport" value="40000" class="w-full bg-slate-800 rounded p-2 mt-1 focus:outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div class="flex gap-2">
                        <div class="w-1/2">
                            <label class="text-slate-400">Taux (%)</label>
                            <input type="number" id="tauxPret" value="3.65" step="0.01" class="w-full bg-slate-800 rounded p-2 mt-1">
                        </div>
                        <div class="w-1/2">
                            <label class="text-slate-400">Durée (ans)</label>
                            <input type="number" id="dureePret" value="25" class="w-full bg-slate-800 rounded p-2 mt-1">
                        </div>
                    </div>
                    <div>
                        <label class="text-slate-400">Appréciation Bien (%/an)</label>
                        <input type="number" id="appreciationImmo" value="1.5" step="0.1" class="w-full bg-slate-800 rounded p-2 mt-1 text-emerald-400">
                    </div>
                </div>

                <h3 class="text-sm font-bold uppercase tracking-wider text-slate-500 border-b border-slate-700 pb-1 mt-6">Location</h3>
                <div class="grid grid-cols-1 gap-3 text-xs">
                    <div>
                        <label class="text-slate-400">Loyer initial (€)</label>
                        <input type="number" id="loyer" value="750" class="w-full bg-slate-800 rounded p-2 mt-1">
                    </div>
                    <div>
                        <label class="text-slate-400">Inflation Loyers (%/an)</label>
                        <input type="number" id="inflationLoyers" value="2.0" step="0.1" class="w-full bg-slate-800 rounded p-2 mt-1 text-orange-400">
                    </div>
                    <div>
                        <label class="text-slate-400">Rendement Épargne (%/an)</label>
                        <input type="number" id="rendementEpargne" value="4.5" step="0.1" class="w-full bg-slate-800 rounded p-2 mt-1 text-blue-400">
                    </div>
                </div>

                <h3 class="text-sm font-bold uppercase tracking-wider text-slate-500 border-b border-slate-700 pb-1 mt-6">Simulation</h3>
                <div>
                    <label class="text-xs text-slate-400">Années de comparaison</label>
                    <input type="number" id="anneesSimulation" value="25" class="w-full bg-slate-800 rounded p-2 mt-1 text-xs">
                </div>
            </div>
        </div>

        <div class="flex-1 p-6 md:p-10 flex flex-col">
            <h1 class="text-3xl font-black text-slate-900 mb-6 uppercase">Comparaison Achat immobilier / Location</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100 flex flex-col justify-between">
                    <div>
                        <h4 class="text-blue-900 font-bold text-sm uppercase tracking-wide mb-4">Coût Mensuel (Année 1)</h4>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-slate-600">Propriétaire</span>
                            <span id="coutMensuelProprio" class="font-bold text-slate-900 text-lg no-wrap">0 €</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-600">Locataire</span>
                            <span id="coutMensuelLocataire" class="font-bold text-slate-900 text-lg no-wrap">0 €</span>
                        </div>
                    </div>
                    <p id="phraseEpargne" class="mt-4 text-xs text-blue-700 leading-relaxed italic border-t border-blue-200 pt-3"></p>
                </div>

                <div class="bg-slate-900 p-6 rounded-2xl text-white shadow-xl flex flex-col justify-between">
                    <div>
                        <h4 class="text-slate-400 font-bold text-sm uppercase tracking-wide mb-4">Patrimoine brut final</h4>
                        <div class="flex justify-between items-end mb-3">
                            <span class="text-slate-300 text-sm">Achat</span>
                            <span id="patrimoineAchat" class="font-black text-emerald-400 text-2xl no-wrap">0 €</span>
                        </div>
                        <div class="flex justify-between items-end mb-4">
                            <span class="text-slate-300 text-sm">Location</span>
                            <span id="patrimoineLocation" class="font-black text-blue-400 text-2xl no-wrap">0 €</span>
                        </div>
                    </div>
                    <div class="bg-white/10 rounded-lg p-3 text-center">
                        <span id="ecartPourcentage" class="text-sm font-bold"></span>
                    </div>
                </div>
            </div>

            <div class="flex-grow min-h-[350px]">
                <canvas id="patrimoineChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        function calculer() {
            // Inputs
            const prixBienBase = parseFloat(document.getElementById('prixBien').value);
            const apport = parseFloat(document.getElementById('apport').value);
            const tauxPret = parseFloat(document.getElementById('tauxPret').value) / 100;
            const dureePret = parseInt(document.getElementById('dureePret').value);
            const appreciationImmo = parseFloat(document.getElementById('appreciationImmo').value) / 100;
            
            const loyerBase = parseFloat(document.getElementById('loyer').value);
            const inflationLoyers = parseFloat(document.getElementById('inflationLoyers').value) / 100;
            const rendementEpargne = parseFloat(document.getElementById('rendementEpargne').value) / 100;
            const anneesSimulation = parseInt(document.getElementById('anneesSimulation').value);

            // Hypothèses fixes
            const fraisNotaire = prixBienBase * 0.08;
            const fraisAnnuelsProprioBase = 2000; // Taxe foncière + charges

            // Calcul Prêt
            const montantEmprunte = (prixBienBase + fraisNotaire) - apport;
            const tauxMensuel = tauxPret / 12;
            const nbMoisPret = dureePret * 12;
            let mensPret = (tauxPret > 0) ? (montantEmprunte * tauxMensuel) / (1 - Math.pow(1 + tauxMensuel, -nbMoisPret)) : montantEmprunte / nbMoisPret;

            // Stats Année 1
            document.getElementById('coutMensuelProprio').textContent = Math.round(mensPret + (fraisAnnuelsProprioBase/12)).toLocaleString() + ' €';
            document.getElementById('coutMensuelLocataire').textContent = Math.round(loyerBase).toLocaleString() + ' €';

            // Boucle de simulation
            const labels = [];
            const dataAchat = [];
            const dataLocation = [];

            let capitalRestantDu = montantEmprunte;
            let epargneLocataire = apport; 
            let epargneProprio = 0;
            let valeurBienActuelle = prixBienBase;
            let loyerActuel = loyerBase;
            let fraisProprioActuel = fraisAnnuelsProprioBase / 12;

            for (let annee = 0; annee <= anneesSimulation; annee++) {
                labels.push('An ' + annee);

                if (annee === 0) {
                    dataAchat.push(prixBienBase - montantEmprunte);
                    dataLocation.push(apport);
                    continue;
                }

                // Simulation mois par mois
                for (let m = 1; m <= 12; m++) {
                    // 1. Inflation et Appréciation (mensualisée)
                    valeurBienActuelle *= (1 + appreciationImmo/12);
                    loyerActuel *= (1 + inflationLoyers/12);
                    fraisProprioActuel *= (1 + inflationLoyers/12); // Les charges montent aussi

                    // 2. Coûts du mois
                    let coutP = fraisProprioActuel;
                    if ( (annee-1)*12 + m <= nbMoisPret ) {
                        coutP += mensPret;
                        let interets = capitalRestantDu * tauxMensuel;
                        capitalRestantDu -= (mensPret - interets);
                    }

                    // 3. Épargne
                    epargneLocataire *= (1 + rendementEpargne/12);
                    epargneProprio *= (1 + rendementEpargne/12);

                    if (coutP > loyerActuel) {
                        epargneLocataire += (coutP - loyerActuel);
                    } else {
                        epargneProprio += (loyerActuel - coutP);
                    }
                }

                dataAchat.push(Math.round(valeurBienActuelle - Math.max(0, capitalRestantDu) + epargneProprio));
                dataLocation.push(Math.round(epargneLocataire));
            }

            // Affichage Final
            const finalAchat = dataAchat[dataAchat.length - 1];
            const finalLoc = dataLocation[dataLocation.length - 1];
            document.getElementById('patrimoineAchat').textContent = finalAchat.toLocaleString() + ' €';
            document.getElementById('patrimoineLocation').textContent = finalLoc.toLocaleString() + ' €';

            // Calcul %
            const diff = finalAchat - finalLoc;
            const pct = (diff / finalLoc) * 100;
            const indicator = document.getElementById('ecartPourcentage');
            indicator.textContent = (pct >= 0) ? `+${pct.toFixed(1)}% en faveur de l'achat` : `${pct.toFixed(1)}% en faveur de la location`;
            indicator.className = (pct >= 0) ? "text-emerald-400 font-bold" : "text-orange-400 font-bold";

            document.getElementById('phraseEpargne').innerHTML = `L'inflation des loyers (${(inflationLoyers*100).toFixed(1)}%) et l'appréciation du bien (${(appreciationImmo*100).toFixed(1)}%) sont incluses dans le calcul mois par mois.`;

            updateChart(labels, dataAchat, dataLocation);
        }

        function updateChart(labels, dataAchat, dataLocation) {
            const ctx = document.getElementById('patrimoineChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Achat', data: dataAchat, borderColor: '#10b981', borderWidth: 4, pointRadius: 0, tension: 0.3, fill: false },
                        { label: 'Location', data: dataLocation, borderColor: '#3b82f6', borderWidth: 4, pointRadius: 0, tension: 0.3, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#f1f5f9' }, ticks: { callback: v => v.toLocaleString() + ' €' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        document.querySelectorAll('input').forEach(i => i.addEventListener('input', calculer));
        calculer();
    </script>
</body>
</html>
